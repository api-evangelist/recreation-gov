      in: header
      name: apikey
      value: '{{RECREATION_GOV_TOKEN}}'
    resources:
    - name: activities
      path: /activities
      operations:
      - name: listactivities
        method: GET
        description: List activities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
